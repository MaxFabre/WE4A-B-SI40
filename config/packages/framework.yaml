# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

    assets:
        packages:
            placeholders:
                base_path: /resources/placeholders

            profil_pictures:
                base_path: /resources/images/profil_pictures

            films_cover:
                base_path: /resources/images/films_cover

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
