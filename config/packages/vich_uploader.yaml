vich_uploader:
    db_driver: orm

    mappings:
        profil_pictures:
            uri_prefix: /images/profil_pictures
            upload_destination: '%kernel.project_dir%/public/resources/images/profil_pictures'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        films_cover:
            uri_prefix: /images/films_cover
            upload_destination: '%kernel.project_dir%/public/resources/images/films_cover'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
